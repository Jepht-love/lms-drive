<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LMS Drive — Hors-ligne</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', sans-serif;
      background: #ffffff;
      color: #111111;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
      text-align: center;
    }
    .icon {
      width: 72px;
      height: 72px;
      background: #F1F1F1;
      border-radius: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 24px;
      font-size: 32px;
    }
    h1 { font-size: 22px; font-weight: 700; margin-bottom: 8px; }
    p  { font-size: 14px; color: #6B7280; line-height: 1.6; max-width: 300px; margin-bottom: 32px; }
    a  {
      display: inline-block;
      background: #111111;
      color: #ffffff;
      padding: 12px 28px;
      border-radius: 12px;
      font-size: 14px;
      font-weight: 600;
      text-decoration: none;
      min-height: 44px;
      line-height: 20px;
    }
    .retry {
      display: block;
      margin-top: 12px;
      font-size: 13px;
      color: #9CA3AF;
      cursor: pointer;
      background: none;
      border: none;
      text-decoration: underline;
      min-height: 44px;
    }
  </style>
</head>
<body>
  <div class="icon">📡</div>
  <h1>Connexion perdue</h1>
  <p>LMS Drive nécessite une connexion pour cette page.<br/>Les EDL déjà ouverts restent accessibles.</p>
  <a href="/">Retour à l'accueil</a>
  <button class="retry" onclick="window.location.reload()">Réessayer</button>
</body>
</html>
